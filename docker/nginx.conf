limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream nextjs {
    server frontend:3000;
}

upstream api {
    server backend:8000;
}

# HTTP server — serves traffic directly when no SSL certs exist,
# redirects to HTTPS when certs are present.
server {
    listen 80;
    server_name roosk.ai www.roosk.ai localhost;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # If SSL certs exist, redirect to HTTPS
    set $redirect_to_https 0;
    if (-f /etc/letsencrypt/live/roosk.ai/fullchain.pem) {
        set $redirect_to_https 1;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Next.js frontend
    location / {
        if ($redirect_to_https) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js HMR WebSocket (dev)
    location /_next/webpack-hmr {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API WebSocket endpoints (notifications, terminals)
    location /api/notifications/ws {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API proxy
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting for public endpoints
        limit_req zone=api burst=20 nodelay;
    }

    # Health endpoint
    location /health {
        proxy_pass http://api;
    }

    # WebSocket proxy (SSH terminal, real-time feeds)
    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Swagger docs
    location /docs {
        proxy_pass http://api;
    }

    location /redoc {
        proxy_pass http://api;
    }

    location /openapi.json {
        proxy_pass http://api;
    }
}

# HTTPS server — only loaded when SSL certs exist
# To enable: run scripts/init-ssl.sh, then restart nginx
# ssl_certificate /etc/letsencrypt/live/roosk.ai/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/roosk.ai/privkey.pem;
