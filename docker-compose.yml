# Roosk NexGen Platform — Docker Compose
# Database: host PostgreSQL 16 + pgvector
# Reverse proxy: host nginx on port 80/443
# Run: docker compose up -d

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nexgen:nexgen_dev@10.20.0.20:5432/nexgen_platform}
      DEBUG: ${DEBUG:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","https://roosk.ai"]}
      BEDROCK_ONLY: ${BEDROCK_ONLY:-true}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      PROXMOX_URL: ${PROXMOX_URL:-https://host.docker.internal:8006}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-platform@pve!platform-token}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET}
      PROXMOX_VERIFY_SSL: ${PROXMOX_VERIFY_SSL:-false}
      PROXMOX_STORAGE: ${PROXMOX_STORAGE:-nexgen-vms}
      PROXMOX_ISO_STORAGE: ${PROXMOX_ISO_STORAGE:-local}
      PROXMOX_BRIDGE_PREFIX: ${PROXMOX_BRIDGE_PREFIX:-vmbr}
      PROXMOX_UBUNTU_ISO: ${PROXMOX_UBUNTU_ISO:-ubuntu-22.04.iso}
    volumes:
      - /opt/nexgen/.ssh:/opt/nexgen/.ssh:ro
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      API_URL: ${API_URL:-http://backend:8000}
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
